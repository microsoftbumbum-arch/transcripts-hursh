<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Transcripts — hursh</title>
<style>
  :root{
    --bg: #15161a;
    --panel: #1c1e24;
    --panel-2: #22242b;
    --line: #2c2f38;
    --text: #e7e8ec;
    --muted: #8b8f9c;
    --accent: #6d7cf7;
    --accent-soft: rgba(109,124,247,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height:100vh;
  }

  /* ---------- Tela de senha ---------- */
  #lock{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .lock-card{
    width:100%;
    max-width:360px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px 28px;
    text-align:center;
  }
  .lock-icon{
    width:44px;height:44px;
    margin:0 auto 16px;
    border-radius:50%;
    background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);
    font-size:20px;
  }
  .lock-card h1{
    font-size:17px;
    margin:0 0 6px;
    font-weight:600;
  }
  .lock-card p{
    font-size:13px;
    color:var(--muted);
    margin:0 0 20px;
  }
  #senha{
    width:100%;
    padding:11px 14px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    font-size:14px;
    outline:none;
    text-align:center;
    letter-spacing:1px;
  }
  #senha:focus{ border-color: var(--accent); }
  #entrar{
    width:100%;
    margin-top:12px;
    padding:11px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#fff;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  #entrar:hover{ filter:brightness(1.08); }
  #erro{
    color:#f36b6b;
    font-size:12.5px;
    margin-top:10px;
    min-height:16px;
  }

  /* ---------- Painel ---------- */
  #painel{ display:none; }
  header{
    padding:22px 28px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  header h1{
    font-size:16px;
    margin:0;
    font-weight:600;
  }
  header .sub{
    font-size:12.5px;
    color:var(--muted);
    margin-top:3px;
  }
  #busca{
    padding:9px 14px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    font-size:13px;
    width:220px;
    outline:none;
  }
  #busca:focus{ border-color: var(--accent); }

  main{ padding:22px 28px 60px; max-width:900px; margin:0 auto; }

  .item{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .item .nome{
    font-size:14px;
    font-weight:600;
  }
  .item .meta{
    font-size:12px;
    color:var(--muted);
    margin-top:3px;
  }
  .item a{
    background:var(--accent-soft);
    color:var(--accent);
    text-decoration:none;
    font-size:12.5px;
    font-weight:600;
    padding:8px 14px;
    border-radius:7px;
    white-space:nowrap;
  }
  .item a:hover{ filter:brightness(1.15); }

  #vazio{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:60px 20px;
    display:none;
  }
</style>
</head>
<body>

  <div id="lock">
    <div class="lock-card">
      <div class="lock-icon">🔒</div>
      <h1>Painel de Transcripts</h1>
      <p>Acesso restrito à equipe de suporte.</p>
      <input type="password" id="senha" placeholder="Senha" autocomplete="off">
      <button id="entrar">Entrar</button>
      <div id="erro"></div>
    </div>
  </div>

  <div id="painel">
    <header>
      <div>
        <h1>Transcripts de tickets</h1>
        <div class="sub" id="contagem">carregando...</div>
      </div>
      <input type="text" id="busca" placeholder="Buscar por canal ou usuário...">
    </header>
    <main>
      <div id="lista"></div>
      <div id="vazio">Nenhum transcript encontrado.</div>
    </main>
  </div>

<script>
  // Senha simples de acesso — não é criptografia real, apenas filtra acesso casual.
  const SENHA_CORRETA = "HURSH019";
  const CHAVE_SESSAO = "transcripts_auth";

  const lock = document.getElementById('lock');
  const painel = document.getElementById('painel');
  const inputSenha = document.getElementById('senha');
  const btnEntrar = document.getElementById('entrar');
  const erro = document.getElementById('erro');

  function entrar(){
    if(inputSenha.value === SENHA_CORRETA){
      sessionStorage.setItem(CHAVE_SESSAO, "1");
      mostrarPainel();
    } else {
      erro.textContent = "Senha incorreta.";
      inputSenha.value = "";
      inputSenha.focus();
    }
  }

  btnEntrar.addEventListener('click', entrar);
  inputSenha.addEventListener('keydown', e => { if(e.key === 'Enter') entrar(); });

  function mostrarPainel(){
    lock.style.display = 'none';
    painel.style.display = 'block';
    carregarTranscripts();
  }

  if(sessionStorage.getItem(CHAVE_SESSAO) === "1"){
    mostrarPainel();
  }

  let todos = [];

  async function carregarTranscripts(){
    const contagem = document.getElementById('contagem');
    try{
      const resp = await fetch('transcripts.json?t=' + Date.now());
      todos = resp.ok ? await resp.json() : [];
    }catch(e){
      todos = [];
    }
    contagem.textContent = todos.length + (todos.length === 1 ? ' transcript' : ' transcripts');
    renderizar(todos);
  }

  function renderizar(lista){
    const container = document.getElementById('lista');
    const vazio = document.getElementById('vazio');
    container.innerHTML = '';

    if(lista.length === 0){
      vazio.style.display = 'block';
      return;
    }
    vazio.style.display = 'none';

    for(const t of lista){
      const div = document.createElement('div');
      div.className = 'item';

      const dataFormatada = t.date ? new Date(t.date).toLocaleString('pt-BR') : '';

      div.innerHTML = `
        <div>
          <div class="nome">#${escapeHtml(t.channelName || 'ticket')}</div>
          <div class="meta">Fechado por ${escapeHtml(t.closedByTag || '—')} · ${dataFormatada}</div>
        </div>
        <a href="${t.url}" target="_blank" rel="noopener">Abrir transcript</a>
      `;
      container.appendChild(div);
    }
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[m]));
  }

  document.getElementById('busca').addEventListener('input', e => {
    const termo = e.target.value.toLowerCase().trim();
    if(!termo){ renderizar(todos); return; }
    const filtrados = todos.filter(t =>
      (t.channelName || '').toLowerCase().includes(termo) ||
      (t.closedByTag || '').toLowerCase().includes(termo)
    );
    renderizar(filtrados);
  });
</script>

</body>
</html>
