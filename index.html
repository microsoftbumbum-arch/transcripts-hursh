<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Painel de Transcripts — hursh</title>
<style>
  :root{
    --bg: #15161a;
    --panel: #1c1e24;
    --panel-2: #22242b;
    --line: #2c2f38;
    --text: #e7e8ec;
    --muted: #8b8f9c;
    --accent: #6d7cf7;
    --accent-soft: rgba(109,124,247,0.12);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Segoe UI', Roboto, -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height:100vh;
  }

  /* ---------- Tela de senha ---------- */
  #lock{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .lock-card{
    width:100%;
    max-width:360px;
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:14px;
    padding:32px 28px;
    text-align:center;
  }
  .lock-icon{
    width:44px;height:44px;
    margin:0 auto 16px;
    border-radius:50%;
    background:var(--accent-soft);
    display:flex;align-items:center;justify-content:center;
    color:var(--accent);
    font-size:14px;
    font-weight:700;
    letter-spacing:0.5px;
  }
  .lock-card h1{
    font-size:17px;
    margin:0 0 6px;
    font-weight:600;
  }
  .lock-card p{
    font-size:13px;
    color:var(--muted);
    margin:0 0 20px;
  }
  #senha{
    width:100%;
    padding:11px 14px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    font-size:14px;
    outline:none;
    text-align:center;
    letter-spacing:1px;
  }
  #senha:focus{ border-color: var(--accent); }
  #entrar{
    width:100%;
    margin-top:12px;
    padding:11px;
    border:none;
    border-radius:8px;
    background:var(--accent);
    color:#fff;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
  }
  #entrar:hover{ filter:brightness(1.08); }
  #erro{
    color:#f36b6b;
    font-size:12.5px;
    margin-top:10px;
    min-height:16px;
  }

  /* ---------- Painel ---------- */
  #painel{ display:none; }
  header{
    padding:22px 28px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  header h1{
    font-size:16px;
    margin:0;
    font-weight:600;
  }
  header .sub{
    font-size:12.5px;
    color:var(--muted);
    margin-top:3px;
  }
  #busca{
    padding:9px 14px;
    border-radius:8px;
    border:1px solid var(--line);
    background:var(--panel-2);
    color:var(--text);
    font-size:13px;
    width:220px;
    outline:none;
  }
  #busca:focus{ border-color: var(--accent); }
  main{ padding:22px 28px 60px; max-width:900px; margin:0 auto; }

  .item{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:10px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .item .nome{
    font-size:14px;
    font-weight:600;
  }
  .item .meta{
    font-size:12px;
    color:var(--muted);
    margin-top:3px;
  }
  .item a{
    background:var(--accent-soft);
    color:var(--accent);
    text-decoration:none;
    font-size:12.5px;
    font-weight:600;
    padding:8px 14px;
    border-radius:7px;
    white-space:nowrap;
  }
  .item a:hover{ filter:brightness(1.15); }

  .busca-wrap{
    display:flex;
    gap:8px;
  }
  #btn-buscar{
    padding:9px 16px;
    border-radius:8px;
    border:none;
    background:var(--accent);
    color:#fff;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  #btn-buscar:hover{ filter:brightness(1.08); }
  #btn-buscar:disabled{ opacity:0.6; cursor:default; }

  #resultado-ia{
    background:var(--panel);
    border:1px solid var(--accent);
    border-radius:10px;
    padding:16px 18px;
    margin-bottom:16px;
    font-size:13.5px;
    line-height:1.5;
  }
  #resultado-ia .titulo-ia{
    font-size:11.5px;
    text-transform:uppercase;
    letter-spacing:0.5px;
    color:var(--accent);
    font-weight:700;
    margin-bottom:8px;
  }
  #resultado-ia .relacionados{
    margin-top:12px;
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  #resultado-ia .relacionados a{
    font-size:12.5px;
    color:var(--accent);
    text-decoration:none;
  }
  #resultado-ia .relacionados a:hover{ text-decoration:underline; }

  #vazio{
    text-align:center;
    color:var(--muted);
    font-size:13px;
    padding:60px 20px;
    display:none;
  }
</style>
</head>
<body>

  <div id="lock">
    <div class="lock-card">
      <div class="lock-icon">HS</div>
      <h1>hursh · central de tickets</h1>
      <p>Área da equipe. Digite a chave de acesso.</p>
      <input type="password" id="senha" placeholder="••••••••" autocomplete="off">
      <button id="entrar">Acessar</button>
      <div id="erro"></div>
    </div>
  </div>

  <div id="painel">
    <header>
      <div>
        <h1>Transcripts de tickets</h1>
        <div class="sub" id="contagem">carregando histórico...</div>
      </div>
      <input type="text" id="busca" placeholder="Pergunte algo sobre os tickets...">
      <button id="btn-buscar">Buscar</button>
    </header>
    <main>
      <div id="resultado-ia" style="display:none;"></div>
      <div id="lista"></div>
      <div id="vazio">Nenhum ticket fechado ainda.</div>
    </main>
  </div>

<script>
  const SENHA_CORRETA = "HURSH019";
  const CHAVE_SESSAO = "hursh_auth";

  const lock = document.getElementById('lock');
  const painel = document.getElementById('painel');
  const inputSenha = document.getElementById('senha');
  const btnEntrar = document.getElementById('entrar');
  const erro = document.getElementById('erro');

  function entrar(){
    if(inputSenha.value === SENHA_CORRETA){
      sessionStorage.setItem(CHAVE_SESSAO, "1");
      mostrarPainel();
    } else {
      erro.textContent = "Senha incorreta.";
      inputSenha.value = "";
      inputSenha.focus();
    }
  }

  btnEntrar.addEventListener('click', entrar);
  inputSenha.addEventListener('keydown', e => { if(e.key === 'Enter') entrar(); });

  function mostrarPainel(){
    lock.style.display = 'none';
    painel.style.display = 'block';
    carregarTranscripts();
  }

  if(sessionStorage.getItem(CHAVE_SESSAO) === "1"){
    mostrarPainel();
  }

  let todos = [];

  async function carregarTranscripts(){
    const contagem = document.getElementById('contagem');
    try{
      const resp = await fetch('transcripts.json?t=' + Date.now());
      todos = resp.ok ? await resp.json() : [];
    }catch(e){
      todos = [];
    }
    contagem.textContent = todos.length + (todos.length === 1 ? ' transcript' : ' transcripts');
    renderizar(todos);
  }

  function renderizar(lista){
    const container = document.getElementById('lista');
    const vazio = document.getElementById('vazio');
    container.innerHTML = '';

    if(lista.length === 0){
      vazio.style.display = 'block';
      return;
    }
    vazio.style.display = 'none';

    for(const t of lista){
      const div = document.createElement('div');
      div.className = 'item';

      const dataFormatada = t.date ? new Date(t.date).toLocaleString('pt-BR') : '';

      div.innerHTML = `
        <div>
          <div class="nome">#${escapeHtml(t.channelName || 'ticket')}</div>
          <div class="meta">Fechado por ${escapeHtml(t.closedByTag || '—')} · ${dataFormatada}</div>
        </div>
        <a href="${t.url}" target="_blank" rel="noopener">Abrir transcript</a>
      `;
      container.appendChild(div);
    }
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, m => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[m]));
  }

  const GROQ_API_KEY = "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";
  const GROQ_MODEL = "llama-3.3-70b-versatile";

  async function buscarComIA(pergunta){
    const btn = document.getElementById('btn-buscar');
    const caixaResultado = document.getElementById('resultado-ia');

    if(!pergunta.trim()){
      caixaResultado.style.display = 'none';
      renderizar(todos);
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Buscando...';
    caixaResultado.style.display = 'block';
    caixaResultado.innerHTML = `<div class="titulo-ia">Resposta</div>Analisando os tickets...`;

    // Monta um resumo enxuto de cada ticket para mandar como contexto pro modelo
    const contexto = todos.map((t, i) =>
      `[${i}] canal: ${t.channelName || '—'} | fechado por: ${t.closedByTag || '—'} | data: ${t.date || '—'}`
    ).join('\n');

    const prompt = `Você é o assistente do painel de tickets da hursh. Abaixo está a lista de tickets já fechados (índice, canal, quem fechou e data). ` +
      `Responda a pergunta do usuário em português, de forma direta e curta, dizendo quais tickets (pelo índice) são relevantes.\n\n` +
      `Tickets:\n${contexto}\n\nPergunta: ${pergunta}\n\n` +
      `Responda em texto corrido curto e, na última linha, liste os índices relevantes assim: INDICES: 0,2,5 (ou INDICES: nenhum se não achar nada).`;

    try {
      const resp = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${GROQ_API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          model: GROQ_MODEL,
          messages: [{ role: "user", content: prompt }],
          temperature: 0.2
        })
      });

      const data = await resp.json();
      const texto = data.choices?.[0]?.message?.content || "Não consegui analisar os tickets agora.";

      // Extrai os índices citados pela IA na última linha
      const match = texto.match(/INDICES:\s*([\d,\s]+|nenhum)/i);
      let indices = [];
      if(match && !/nenhum/i.test(match[1])){
        indices = match[1].split(',').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
      }
      const respostaLimpa = texto.replace(/INDICES:.*$/i, '').trim();
      const relacionados = indices.map(i => todos[i]).filter(Boolean);

      caixaResultado.innerHTML = `
        <div class="titulo-ia">Resposta</div>
        ${escapeHtml(respostaLimpa)}
        ${relacionados.length ? `<div class="relacionados">${relacionados.map(t =>
          `<a href="${t.url}" target="_blank" rel="noopener">↳ #${escapeHtml(t.channelName || 'ticket')} — ${escapeHtml(t.closedByTag || '')}</a>`
        ).join('')}</div>` : ''}
      `;

      renderizar(relacionados.length ? relacionados : todos);
    } catch(e){
      caixaResultado.innerHTML = `<div class="titulo-ia">Resposta</div>Não foi possível consultar agora. Tente novamente.`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Buscar';
    }
  }

  document.getElementById('btn-buscar').addEventListener('click', () => {
    buscarComIA(document.getElementById('busca').value);
  });
  document.getElementById('busca').addEventListener('keydown', e => {
    if(e.key === 'Enter') buscarComIA(e.target.value);
  });
</script>

</body>
</html>
